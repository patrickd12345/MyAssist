name: CI

on:
  push:
  pull_request:

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build harness
        run: pnpm run build:harness

      - name: Lint
        working-directory: apps/web
        run: pnpm lint

      - name: Typecheck
        working-directory: apps/web
        run: pnpm typecheck

      - name: Unit tests
        working-directory: apps/web
        run: pnpm test
        env:
          CI: true

      - name: Env readiness (development profile)
        working-directory: apps/web
        run: pnpm check:env
        env:
          CI: true

      - name: Production build
        working-directory: apps/web
        run: pnpm build
        env:
          AUTH_SECRET: ci-build-placeholder-secret-32chars-minimum-length

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E smoke
        working-directory: apps/web
        run: pnpm exec playwright test
        env:
          CI: true
          MYASSIST_USE_MOCK_CONTEXT: "true"
